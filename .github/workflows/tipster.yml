name: SuperPronostico Tipster

on:
  schedule:
    - cron: '0 10 * * *'    # 12:00 IT (UTC+2) — schedina mattina
    - cron: '0 15 * * *'    # 17:00 IT (UTC+2) — schedina sera
  workflow_dispatch:
    inputs:
      fascia:
        description: 'Fascia da pubblicare'
        required: true
        default: 'mattina'
        type: choice
        options:
          - mattina
          - sera

jobs:
  schedina-mattina:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.fascia == 'mattina')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python tipster_gemini.py mattina
        env:
          ODDS_API_KEY:     ${{ secrets.ODDS_API_KEY }}
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          CHAT_ID:          ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          SHEET_ID:         ${{ secrets.SHEET_ID }}
          GOOGLE_CREDS:     ${{ secrets.GOOGLE_CREDS }}

  schedina-sera:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 15 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.fascia == 'sera')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python tipster_gemini.py sera
        env:
          ODDS_API_KEY:     ${{ secrets.ODDS_API_KEY }}
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          CHAT_ID:          ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          SHEET_ID:         ${{ secrets.SHEET_ID }}
          GOOGLE_CREDS:     ${{ secrets.GOOGLE_CREDS }}
