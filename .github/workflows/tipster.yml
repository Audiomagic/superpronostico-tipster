name: SuperPronostico Tipster

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 16 * * *'
    - cron: '30 21 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Azione da eseguire'
        required: true
        default: 'mattina'
        type: choice
        options:
          - mattina
          - sera
          - risultati

jobs:
  schedina-mattina:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'mattina')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python schedina_mattina.py
        env:
          ODDS_API_KEY:   ${{ secrets.ODDS_API_KEY }}
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          CHAT_ID:        ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHEET_ID:       ${{ secrets.SHEET_ID }}
          GOOGLE_CREDS:   ${{ secrets.GOOGLE_CREDS }}

  schedina-sera:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'sera')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python schedina_sera.py
        env:
          ODDS_API_KEY:   ${{ secrets.ODDS_API_KEY }}
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          CHAT_ID:        ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHEET_ID:       ${{ secrets.SHEET_ID }}
          GOOGLE_CREDS:   ${{ secrets.GOOGLE_CREDS }}

  controlla-risultati:
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '30 21 * * *' || github.event.schedule == '0 6 * * *')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'risultati')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python controlla_risultati.py
        env:
          ODDS_API_KEY:   ${{ secrets.ODDS_API_KEY }}
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          CHAT_ID:        ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHEET_ID:       ${{ secrets.SHEET_ID }}
          GOOGLE_CREDS:   ${{ secrets.GOOGLE_CREDS }}
